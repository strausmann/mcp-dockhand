name: Dockhand API Change
description: Document a Dockhand API change that requires MCP server updates
title: "[API Change]: "
labels: ["api-change", "priority: high"]
body:
  - type: input
    id: dockhand-version
    attributes:
      label: Affected Dockhand Version
      placeholder: "e.g. 1.0.23"
    validations:
      required: true
  - type: textarea
    id: changes
    attributes:
      label: API Changes
      description: Which endpoints have changed?
    validations:
      required: true
  - type: textarea
    id: affected-tools
    attributes:
      label: Affected MCP Tools
      description: Which MCP tools need to be updated?
    validations:
      required: true
  - type: dropdown
    id: breaking
    attributes:
      label: Breaking Change?
      options:
        - "Yes"
        - "No"
    validations:
      required: true
