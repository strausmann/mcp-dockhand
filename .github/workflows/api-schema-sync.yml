name: Dockhand API Schema Sync

on:
  schedule:
    - cron: '0 5 * * *'  # Täglich 05:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  sync-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Extract Dockhand API Schema
        run: node scripts/extract-dockhand-api.mjs

      - name: Check for changes
        id: changes
        run: |
          if [ ! -f docs/dockhand-api-schema.json ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Kein Schema vorhanden — Initiale Extraktion"
          elif ! git diff --quiet docs/dockhand-api-schema.json; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Schema hat sich geändert"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Keine Änderungen"
          fi

      - name: Commit schema update
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/dockhand-api-schema.json
          git commit -m "chore: update Dockhand API schema (automated)"
          git push

      - name: Validate MCP tools against schema
        id: validate
        run: node scripts/validate-mcp-tools.mjs
        continue-on-error: true

      - name: Update sticky coverage tracker
        if: always() && hashFiles('validation-report.md') != ''
        uses: actions/github-script@v9
        env:
          REPORT_PATH: validation-report.md
          MARKER_START: '<!-- validator-report:start -->'
          MARKER_END: '<!-- validator-report:end -->'
        with:
          script: |
            const fs = require('fs');

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'coverage-tracker',
              state: 'open',
              per_page: 5,
            });

            if (issues.data.length === 0) {
              core.warning('No open issue with label "coverage-tracker" found — skipping sticky update.');
              return;
            }
            if (issues.data.length > 1) {
              const nums = issues.data.map(i => `#${i.number}`).join(', ');
              core.warning(`Multiple issues carry label "coverage-tracker" (${nums}). Skipping update to avoid clobbering.`);
              return;
            }

            const issue = issues.data[0];
            const body = issue.body || '';
            const startMarker = process.env.MARKER_START;
            const endMarker = process.env.MARKER_END;
            const pattern = new RegExp(`${startMarker}[\\s\\S]*?${endMarker}`);

            if (!pattern.test(body)) {
              core.warning(`Issue #${issue.number} has no validator-report markers — skipping update.`);
              return;
            }

            const report = fs.readFileSync(process.env.REPORT_PATH, 'utf8');
            const today = new Date().toISOString().split('T')[0];
            const runLink = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const stamp = `> _Last sync: ${today} — [run log](${runLink})_\n\n`;
            const replacement = `${startMarker}\n${stamp}${report}\n${endMarker}`;
            const newBody = body.replace(pattern, replacement);

            if (newBody === body) {
              core.info(`Issue #${issue.number} already up to date — no change.`);
              return;
            }

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: newBody,
            });

            core.info(`Updated sticky coverage tracker issue #${issue.number}`);

      - name: Create issue on validation failure
        if: steps.validate.outcome == 'failure'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const report = fs.existsSync('validation-report.md')
              ? fs.readFileSync('validation-report.md', 'utf8')
              : 'Validation failed. Check workflow logs for details.';

            // Prüfe ob bereits ein offenes Issue existiert
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'api-change',
              state: 'open',
            });

            if (existing.data.length > 0) {
              // Update existierendes Issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: `## Aktualisierter Report (${new Date().toISOString().split('T')[0]})\n\n${report}`,
              });
            } else {
              // Neues Issue erstellen
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[API Change]: Dockhand API Schema Mismatch (${new Date().toISOString().split('T')[0]})`,
                labels: ['api-change', 'priority: high', 'status: needs-triage'],
                body: `## Automatisch erkannte API-Änderung\n\nDer tägliche API-Schema-Sync hat Unterschiede zwischen der Dockhand API und unseren MCP-Tools erkannt.\n\n${report}\n\n### Nächste Schritte\n\n- [ ] Report analysieren\n- [ ] Betroffene MCP Tools identifizieren\n- [ ] Anpassungen implementieren\n- [ ] Tests aktualisieren`,
              });
            }

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: validation-report
          path: validation-report.md
          if-no-files-found: ignore
