services:
  mcp-dockhand:
    build: .
    container_name: mcp-dockhand
    restart: unless-stopped
    ports:
      - "${MCP_PORT:-8080}:8080"
    environment:
      - DOCKHAND_URL=${DOCKHAND_URL}
      - DOCKHAND_USERNAME=${DOCKHAND_USERNAME}
      - DOCKHAND_PASSWORD=${DOCKHAND_PASSWORD}
      - MCP_PORT=8080
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
