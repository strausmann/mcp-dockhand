name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement", "status: needs-triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What should be implemented?
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this feature needed?
    validations:
      required: true
  - type: textarea
    id: implementation
    attributes:
      label: Possible Implementation
      description: Any ideas on how to implement this?
  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      options:
        - Container Management
        - Stack Management
        - Image Management
        - Network Management
        - Volume Management
        - Authentication
        - Vulnerability Scanning
        - Other
    validations:
      required: true
