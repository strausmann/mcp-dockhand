name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22]

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: build
    # amd64-only smoke build. arm64 is built and verified on release.yml via a
    # native arm64 runner (build matrix), so emulating it here under QEMU is
    # redundant — and it repeatedly hung for ~6h until GitHub auto-cancelled the
    # job. timeout-minutes is a backstop against any future hang.
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image (amd64 smoke)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  lockfile-integrity:
    # Runs `npm ci` with the EXACT npm that ships in node:22-alpine — the image
    # the release Docker build uses. The `build` job's `npm ci` runs on the
    # runner's npm (a different patch), which validates lockfiles slightly
    # differently and let a broken lock reach main: v1.8.0-1.8.2 tagged but
    # produced no image (npm ci EUSAGE on conventional-commits-filter). No layer
    # cache here, so a stale layer cannot mask an install/ci inconsistency.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: npm ci in production image (node:22-alpine)
        run: docker run --rm -v "$PWD":/app -w /app node:22-alpine npm ci --no-audit --no-fund
