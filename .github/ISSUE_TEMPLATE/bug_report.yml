name: Bug Report
description: Report a bug in the MCP-Dockhand server
title: "[Bug]: "
labels: ["bug", "status: needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below.
  - type: input
    id: version
    attributes:
      label: MCP-Dockhand Version
      description: Which version are you using?
      placeholder: "e.g. 1.0.0 or latest"
    validations:
      required: true
  - type: input
    id: dockhand-version
    attributes:
      label: Dockhand Server Version
      description: Which Dockhand version is running?
      placeholder: "e.g. 1.0.22"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
    validations:
      required: true
  - type: dropdown
    id: transport
    attributes:
      label: MCP Transport
      options:
        - Streamable HTTP
        - stdio
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Error messages, stack traces, etc.
      render: shell
